<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Boyz Pick'em 2026</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="trophy">⚙️</div>
      <div class="header-text">
        <h1>Admin Panel</h1>
        <p class="header-sub">Boyz Pick'em 2026</p>
      </div>
    </div>
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="results">Results</button>
      <button class="tab-btn" data-tab="picks">All Picks</button>
      <button class="tab-btn" data-tab="players">Players</button>
    </nav>
  </header>

  <!-- PIN MODAL -->
  <div class="modal-overlay" id="pinModal">
    <div class="modal">
      <div class="modal-trophy">🔐</div>
      <h2>Admin Access</h2>
      <p>Enter your admin PIN.</p>
      <input type="password" id="pinInput" placeholder="PIN" maxlength="8" inputmode="numeric" />
      <button class="btn-primary" id="submitPin">Unlock →</button>
      <a href="index.html" class="back-link">← Back to bracket</a>
    </div>
  </div>

  <!-- RESULTS TAB -->
  <section class="tab-content active" id="tab-results">
    <div class="section-label">BRACKET CONTROL</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn-sm btn-lock" id="lockAllBtn" style="flex:1;padding:12px;font-size:0.85rem">🔒 Lock All Brackets</button>
      <button class="btn-sm btn-unlock" id="unlockAllBtn" style="flex:1;padding:12px;font-size:0.85rem">🔓 Unlock All Brackets</button>
    </div>
    <div class="section-label">ENTER RESULTS</div>
    <div id="resultsContainer"></div>
  </section>

  <!-- ALL PICKS TAB -->
  <section class="tab-content" id="tab-picks">
    <div class="section-label">ALL PICKS BY MATCH</div>
    <div id="allPicksContainer"></div>
  </section>

  <!-- PLAYERS TAB -->
  <section class="tab-content" id="tab-players">
    <div class="section-label">REGISTERED PLAYERS</div>
    <div id="playersContainer"></div>
  </section>

  <div class="toast" id="toast"></div>

  <script src="config.js"></script>
  <script src="bracket-data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
